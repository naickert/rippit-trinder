<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Trinder · Trade the markets</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='8' y='3' width='16' height='26' rx='3' fill='%23d4af37'/%3E%3Crect x='8' y='3' width='16' height='26' rx='3' fill='none' stroke='%23806014'/%3E%3Crect x='8' y='13' width='16' height='2' fill='%237a5e1e'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --electric:#10c1a8;--flare:#ffd05d;--ink:#f3ecdc;--smoke:#9aa1a8;
    --crimson:#d6564f;--emerald:#3fcf86;--spring:cubic-bezier(.18,.89,.32,1.28);--cell:58px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Space Grotesk",sans-serif;color:var(--ink);background-color:#0a0a0c;
    background-image:
      radial-gradient(ellipse 60% 55% at 50% 50%, rgba(150,150,165,.08), transparent 72%),
      radial-gradient(circle, rgba(220,222,232,.16) 0 1.4px, transparent 2px),
      repeating-linear-gradient(45deg, transparent 0 calc(var(--cell) - 1px), rgba(0,0,0,.6) var(--cell)),
      repeating-linear-gradient(-45deg, transparent 0 calc(var(--cell) - 1px), rgba(0,0,0,.6) var(--cell)),
      repeating-linear-gradient(45deg, transparent 0 calc(var(--cell) - 2px), rgba(255,255,255,.045) calc(var(--cell) - 1px), transparent var(--cell)),
      repeating-linear-gradient(-45deg, transparent 0 calc(var(--cell) - 2px), rgba(255,255,255,.045) calc(var(--cell) - 1px), transparent var(--cell));
    background-size: cover, var(--cell) var(--cell), auto, auto, auto, auto;
    background-position: center, 29px 29px, 0 0, 0 0, 0 0, 0 0;
    min-height:100vh;min-height:100dvh;display:grid;place-items:center;overflow:hidden;user-select:none;
  }
  body::after{content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 75% 65% at 50% 42%, transparent 48%, rgba(0,0,0,.7));}

  .phone{position:relative;width:min(430px,100vw);height:min(900px,100vh);height:min(900px,100dvh);
    display:flex;flex-direction:column;overflow:hidden;z-index:1;
    background:radial-gradient(ellipse 90% 50% at 50% 38%, rgba(255,208,93,.05), transparent 60%);}

  /* ---------- Portfolio header ---------- */
  .portfolio{padding:calc(18px + env(safe-area-inset-top)) 20px 14px;position:relative;z-index:70;}
  .pf-title{text-align:center;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--smoke);margin-bottom:13px;}
  .pf-row{display:grid;grid-template-columns:1fr 1px 1.25fr 1px 1fr;align-items:center;}
  .pf-div{width:1px;height:46px;background:rgba(255,255,255,.1);justify-self:center;}
  .pf-stat{display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;padding:0 4px;}
  .pf-stat small{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--smoke);display:flex;align-items:center;gap:5px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.12);}
  .pf-stat b{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;}
  .pf-stat.snp b{color:var(--electric);}
  .pf-stat.cash b{color:var(--flare);}
  .pf-stat.pl b{font-size:23px;}
  .pf-stat.pl b.up{color:var(--emerald);}
  .pf-stat.pl b.down{color:var(--crimson);}
  .pf-info{width:15px;height:15px;border-radius:50%;border:1px solid var(--smoke);background:none;color:var(--smoke);
    font-size:10px;font-style:italic;font-family:Georgia,"Times New Roman",serif;line-height:1;cursor:pointer;
    display:grid;place-items:center;padding:0;transition:color .2s,border-color .2s;}
  .pf-info:hover{color:var(--flare);border-color:var(--flare);}

  /* ---------- Stage / pack ---------- */
  .stage{position:relative;flex:1;display:grid;place-items:center;padding:22px 0 10px;min-height:0;overflow:hidden;}
  .deckwrap{position:relative;aspect-ratio:0.66;height:min(418px,100%);max-width:74vw;margin:0 auto;}
  #deck{position:absolute;inset:0;}
  .pack{position:absolute;inset:0;border-radius:18px;overflow:hidden;cursor:grab;touch-action:none;
    will-change:transform,opacity;transform:translate(0,0);background:var(--metal);
    box-shadow:0 26px 50px -18px rgba(0,0,0,.9), 0 0 0 1px rgba(0,0,0,.5),
      inset 0 0 0 1px rgba(255,255,255,.2), inset 0 2px 14px rgba(255,255,255,.28);}
  .pack.grab{cursor:grabbing;}
  .pack.settle{transition:transform .5s var(--spring);}
  .pack.bounce{animation:bnc .42s ease;}
  @keyframes bnc{0%,100%{transform:translate(0,0)}30%{transform:translate(0,9px) scale(.99)}60%{transform:translate(0,-4px)}}
  .pack::before{content:"";position:absolute;inset:0;pointer-events:none;border-radius:18px;z-index:2;
    background:
      radial-gradient(120% 74% at 50% 38%, rgba(255,255,255,.20), rgba(255,255,255,0) 60%),
      linear-gradient(107deg, transparent 11%, rgba(255,255,255,.30) 17%, transparent 24%),
      linear-gradient(107deg, transparent 37%, rgba(0,0,0,.20) 43%, transparent 50%),
      linear-gradient(107deg, transparent 59%, rgba(255,255,255,.22) 66%, transparent 73%),
      linear-gradient(107deg, transparent 81%, rgba(0,0,0,.18) 87%, transparent 94%),
      linear-gradient(180deg, rgba(255,255,255,.26), transparent 13%, transparent 83%, rgba(0,0,0,.46));}
  .sheen{position:absolute;top:-30%;left:-60%;width:60%;height:160%;pointer-events:none;z-index:3;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.6),transparent);
    transform:skewX(-18deg);animation:sweep 5.5s ease-in-out infinite;mix-blend-mode:overlay;}
  @keyframes sweep{0%,12%{left:-60%}55%,100%{left:130%}}
  .crimp{position:absolute;left:0;right:0;height:42px;z-index:4;pointer-events:none;--zw:16px;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.24) 0 1px, rgba(0,0,0,.32) 1px 2px, transparent 2px 4px),
      linear-gradient(180deg, rgba(0,0,0,.30), rgba(255,255,255,.16) 50%, rgba(0,0,0,.34));}
  .crimp.top{top:0;filter:drop-shadow(0 2px 2px rgba(0,0,0,.45));
    -webkit-mask:conic-gradient(from -45deg at bottom,#0000,#000 1deg 89deg,#0000 90deg) 0 0/var(--zw) 100%;
    mask:conic-gradient(from -45deg at bottom,#0000,#000 1deg 89deg,#0000 90deg) 0 0/var(--zw) 100%;}
  .crimp.bot{bottom:0;filter:drop-shadow(0 -2px 2px rgba(0,0,0,.45));
    -webkit-mask:conic-gradient(from 135deg at top,#0000,#000 1deg 89deg,#0000 90deg) 0 0/var(--zw) 100%;
    mask:conic-gradient(from 135deg at top,#0000,#000 1deg 89deg,#0000 90deg) 0 0/var(--zw) 100%;}

  .pframe{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;padding:48px 18px;text-align:center;z-index:5;}
  .emboss{color:var(--ink-foil);text-shadow:0 1px 0 var(--ink-hi),0 -1px 1px rgba(0,0,0,.35);}
  .pk-vol{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:center;}
  .vol-tag{font-size:9.5px;letter-spacing:.14em;font-weight:700;text-transform:uppercase;color:var(--ink-foil);display:flex;align-items:center;gap:4px;}
  .vol-tag svg{width:11px;height:11px;fill:var(--ink-foil);}
  .vol-max{font-size:9px;letter-spacing:.04em;font-weight:600;padding:3px 7px;border-radius:99px;background:rgba(0,0,0,.32);color:var(--inkhi-strong);border:1px solid rgba(0,0,0,.25);}
  .pk-tier{margin-top:11px;font-size:10px;letter-spacing:.26em;font-weight:600;text-transform:uppercase;color:var(--ink-foil);opacity:.85;}
  .pk-coll{margin-top:5px;font-size:17px;font-weight:700;letter-spacing:.01em;color:var(--electric);text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .pk-logo{margin-top:auto;font-size:clamp(34px,11vw,44px);font-weight:700;letter-spacing:.1em;line-height:.9;
    background:linear-gradient(180deg,var(--logo-top),var(--logo-mid) 52%,var(--logo-bot));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 1px rgba(0,0,0,.45)) drop-shadow(0 -1px 0 rgba(255,255,255,.25));}
  .pk-sub{font-size:8px;letter-spacing:.3em;font-weight:600;text-transform:uppercase;color:var(--ink-foil);opacity:.7;margin-top:3px;}
  .pk-rule{width:54px;height:2px;margin:13px 0 11px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--ink-foil),transparent);opacity:.5;}
  .pk-price{margin-top:auto;font-size:11px;letter-spacing:.2em;font-weight:600;text-transform:uppercase;color:var(--ink-foil);}
  .pk-price b{font-size:20px;letter-spacing:.02em;margin-left:6px;}

  .phint{position:absolute;z-index:6;color:var(--smoke);font-weight:600;cursor:pointer;opacity:.55;
    transition:opacity .2s,color .2s,transform .2s;display:flex;align-items:center;justify-content:center;}
  .phint:hover{opacity:.95;color:var(--ink);}
  .phint.left,.phint.right{top:50%;transform:translateY(-50%);width:30px;height:54px;font-size:30px;
    background:rgba(20,20,24,.5);border:1px solid rgba(255,255,255,.08);border-radius:12px;line-height:1;}
  .phint.left{left:-42px;} .phint.right{right:-42px;}
  @media (max-width:380px){.phint.left{left:-34px}.phint.right{right:-34px}}

  /* ---------- Stake ---------- */
  .stakebar{display:flex;flex-direction:column;align-items:center;gap:9px;padding:0 18px 4px;position:relative;z-index:20;}
  .stake{display:flex;align-items:center;gap:8px;background:rgba(20,20,24,.6);border:1px solid rgba(255,255,255,.1);
    border-radius:99px;padding:6px 8px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 24px -14px rgba(0,0,0,.8);}
  .step{width:36px;height:38px;display:grid;place-items:center;cursor:pointer;background:none;border:none;color:var(--ink);
    font-size:26px;font-weight:500;line-height:1;font-family:inherit;transition:transform .15s,color .2s;}
  .step:hover{color:var(--flare);}
  .step:active{transform:scale(.82);}
  .step.disabled{opacity:.26;pointer-events:none;}
  .pval{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:58px;}
  .pval small{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--smoke);}
  .pval b{font-size:16px;font-weight:700;color:var(--flare);font-variant-numeric:tabular-nums;}
  .swipehint{text-align:center;font-size:10px;letter-spacing:.06em;color:var(--smoke);opacity:.7;}
  .swipehint b{color:var(--ink);font-weight:600;}

  /* ---------- Action zone ---------- */
  .actionzone{padding:11px 18px calc(15px + env(safe-area-inset-bottom));position:relative;z-index:70;
    border-top:1px solid rgba(255,255,255,.07);background:linear-gradient(0deg,rgba(10,10,12,.94),rgba(10,10,12,.5));}
  .autorow{display:flex;align-items:center;justify-content:center;gap:11px;margin:0 auto 13px;
    background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 4px;}
  .autorow .bolt{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 24px -14px rgba(0,0,0,.8);transition:.2s var(--spring);}
  .autorow .bolt svg{width:22px;height:22px;fill:var(--smoke);transition:fill .2s,filter .2s;}
  .autorow .lbl{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--smoke);font-weight:700;transition:color .2s;}
  .autorow:hover .bolt{transform:translateY(-2px);border-color:rgba(255,208,93,.5);}
  .autorow.on .bolt{background:rgba(255,208,93,.16);border-color:var(--flare);}
  .autorow.on .bolt svg{fill:var(--flare);filter:drop-shadow(0 0 7px rgba(255,208,93,.65));}
  .autorow.on .lbl{color:var(--flare);}

  .mainbtns{display:grid;grid-template-columns:1fr 1.25fr 1fr;gap:9px;align-items:stretch;}
  .mbtn{font-family:inherit;font-weight:700;cursor:pointer;border-radius:16px;padding:15px 6px;
    font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;
    transition:transform .16s var(--spring),filter .2s,background .2s,border-color .2s,box-shadow .2s;}
  .mbtn:active{transform:scale(.95);}
  .mbtn.sell{background:rgba(255,208,93,.06);border:1px solid rgba(255,208,93,.42);color:var(--flare);}
  .mbtn.sell:hover{background:rgba(255,208,93,.14);border-color:var(--flare);}
  .mbtn.revert{background:rgba(63,207,134,.06);border:1px solid rgba(63,207,134,.42);color:var(--emerald);}
  .mbtn.revert:hover{background:rgba(63,207,134,.14);border-color:var(--emerald);}
  .mbtn.buy{background:linear-gradient(160deg,#ffe49f,#f4c64a 55%,#d49b2f);color:#1a1306;
    border:1px solid rgba(255,208,93,.7);box-shadow:0 12px 30px -10px rgba(255,208,93,.6),inset 0 1px 0 rgba(255,255,255,.4);}
  .mbtn.buy:hover{filter:brightness(1.06);transform:translateY(-2px);}
  .mbtn.buy .bt{font-size:16px;letter-spacing:.1em;}
  .mbtn.buy .bc{font-size:12px;font-weight:700;opacity:.82;font-variant-numeric:tabular-nums;}

  .toggles{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:13px;border-top:1px solid rgba(255,255,255,.07);}
  .toggle{display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;font-family:inherit;
    font-size:12px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;color:var(--smoke);transition:color .2s;}
  .toggle .box{width:19px;height:19px;border-radius:6px;border:1.6px solid rgba(255,255,255,.22);display:grid;place-items:center;transition:border-color .2s;}
  .toggle .box::after{content:"";width:9px;height:9px;border-radius:3px;transform:scale(0);transition:transform .18s var(--spring);}
  .toggle.sell.on{color:var(--flare);} .toggle.sell.on .box{border-color:var(--flare);}
  .toggle.sell.on .box::after{background:var(--flare);transform:scale(1);}
  .toggle.revert.on{color:var(--emerald);} .toggle.revert.on .box{border-color:var(--emerald);}
  .toggle.revert.on .box::after{background:var(--emerald);transform:scale(1);}

  @media (max-width:412px){
    .mbtn{padding:13px 4px;font-size:11.5px;}
    .pf-stat b{font-size:17px;} .pf-stat.pl b{font-size:21px;}
    .step{width:32px;height:34px;font-size:21px;}
    .toggle{font-size:11px;}
  }
  @media (max-height:680px){
    .stage{padding:12px 0 6px;}
    .pframe{padding:30px 16px;}
    .portfolio{padding:calc(10px + env(safe-area-inset-top)) 20px 8px;}
    .pf-title{margin-bottom:8px;}
    .autorow{margin-bottom:8px;}
    .toggles{margin-top:9px;padding-top:9px;}
    .swipehint{display:none;}
  }
  @media (max-height:520px){
    .deckwrap{height:min(260px,100%);}
    .pframe{padding:20px 14px 16px;}
    .pk-logo{font-size:clamp(24px,8vw,34px);}
    .actionzone{padding-top:6px;}
    .autorow{margin-bottom:6px;}
  }

  /* ---------- per-card review ---------- */
  .rvwcard{position:relative;width:min(340px,80vw,44vh);height:min(340px,80vw,44vh);border-radius:24px;display:grid;place-items:center;margin:14px 0 6px;
    background:linear-gradient(165deg,#1b1c22,#0d0d11);border:1px solid rgba(255,255,255,.1);touch-action:none;cursor:grab;}
  .rvwcard:active{cursor:grabbing;}
  .rvwcard.in{animation:pop .55s var(--spring);}
  @keyframes pop{0%{transform:scale(.5) rotate(-6deg);opacity:0}60%{transform:scale(1.05) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
  .rvwcard .rvw-g{font-size:min(168px,38vw);line-height:1;filter:drop-shadow(0 10px 18px rgba(0,0,0,.5));}
  .rvw-stamp{position:absolute;top:11%;z-index:5;font-size:24px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    padding:6px 15px;border-radius:11px;border:3px solid;opacity:0;pointer-events:none;transition:opacity .08s;}
  .rvw-stamp.sell{left:14px;color:var(--flare);border-color:var(--flare);transform:rotate(-14deg);box-shadow:0 0 22px rgba(255,208,93,.5);}
  .rvw-stamp.collect{right:14px;color:var(--emerald);border-color:var(--emerald);transform:rotate(14deg);box-shadow:0 0 22px rgba(63,207,134,.5);}
  .rvw-rar{position:absolute;top:16px;left:0;right:0;font-size:13px;letter-spacing:.26em;text-transform:uppercase;font-weight:700;}
  .rvw-name{font-size:24px;font-weight:700;margin-top:18px;}
  .rvw-val{font-size:42px;font-weight:700;color:var(--flare);font-variant-numeric:tabular-nums;text-shadow:0 0 26px rgba(255,208,93,.4);margin-top:2px;}
  .rvw-dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:12px;max-width:220px;}
  .rvw-dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);}
  .rvw-dots i.done{background:var(--electric);}
  .rvw-dots i.cur{background:var(--flare);box-shadow:0 0 8px var(--flare);}
  .rvw-tally{font-size:11px;color:var(--smoke);margin-top:10px;}
  .rvw-tally b{color:var(--emerald);font-variant-numeric:tabular-nums;}
  .btn.green{background:var(--emerald);color:#05140c;box-shadow:0 10px 26px -10px rgba(63,207,134,.6);}

  /* ---------- toast / overlays ---------- */
  #toast{position:absolute;left:50%;top:calc(96px + env(safe-area-inset-top));transform:translate(-50%,-16px);background:rgba(16,16,20,.94);
    border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px);padding:10px 16px;border-radius:12px;
    font-size:12.5px;font-weight:500;opacity:0;pointer-events:none;transition:.35s var(--spring);z-index:80;
    max-width:86%;text-align:center;box-shadow:0 16px 40px -16px rgba(0,0,0,.8);}
  #toast.show{opacity:1;transform:translate(-50%,0);}

  .overlay{position:absolute;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:64px 24px 70px;text-align:center;overflow-y:auto;background:radial-gradient(70% 55% at 50% 45%, rgba(14,14,18,.86), rgba(6,6,8,.97));backdrop-filter:blur(12px);}
  .overlay.show{display:flex;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .ov-tag{font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--smoke);}
  .ov-title{font-size:22px;font-weight:700;margin-top:4px;}
  .ov-sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--smoke);margin-top:3px;}

  .hand{display:flex;gap:8px;justify-content:center;margin:24px 0 6px;perspective:900px;}
  .hand.bulk{flex-wrap:wrap;max-width:268px;gap:6px;margin:16px auto 4px;}
  .hand.bulk .mini{width:46px;height:64px;border-radius:7px;gap:2px;}
  .hand.bulk .mini .mg{font-size:22px;}
  .hand.bulk .mini .mv{font-size:9px;}
  .hand.bulk .mini .mr{font-size:5.5px;top:3px;}
  .mini{width:62px;height:88px;border-radius:9px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    transform:rotateY(90deg);opacity:0;border:1.5px solid var(--mg);background:linear-gradient(165deg,#1b1c22,#0d0d11);box-shadow:0 0 16px -2px var(--mg);
    touch-action:none;cursor:grab;will-change:transform;}
  .mini:active{cursor:grabbing;}
  .mini.in{animation:flipin .55s var(--spring) forwards;}
  @keyframes flipin{0%{transform:rotateY(90deg);opacity:0}60%{transform:rotateY(-8deg)}100%{transform:rotateY(0);opacity:1}}
  .mini .mg{font-size:30px;line-height:1;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));}
  .mini .mv{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;}
  .mini .mr{position:absolute;top:5px;left:0;right:0;font-size:6.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--mg);}
  .rv-swipehint{font-size:11px;color:var(--smoke);margin-top:12px;}
  .total{margin-top:16px;}
  .total small{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--smoke);display:block;}
  .total b{font-size:40px;font-weight:700;color:var(--flare);font-variant-numeric:tabular-nums;text-shadow:0 0 30px rgba(255,208,93,.4);}
  .total .net{font-size:12px;color:var(--smoke);margin-top:3px;}
  .ov-acts{display:flex;gap:10px;margin-top:20px;}

  .btn{font-family:inherit;font-weight:600;font-size:12.5px;letter-spacing:.04em;cursor:pointer;border:none;border-radius:99px;padding:13px 20px;transition:transform .18s var(--spring),filter .2s;}
  .btn:active{transform:scale(.95);}

<script>
const R={
  common:{label:'Common',color:'#9aa7b2',p:.53},
  uncommon:{label:'Uncommon',color:'#10c1a8',p:.345},
  rare:{label:'Rare',color:'#4aa3ff',p:.10},
  epic:{label:'Epic',color:'#b86bff',p:.02},
  legendary:{label:'Legendary',color:'#ffd05d',p:.005},
};
const RORDER=['common','uncommon','rare','epic','legendary'];

const FOIL={
  gold:{metal:'linear-gradient(118deg,#5e4818,#b5902f 13%,#f4e09a 25%,#d4ac42 35%,#7e6320 49%,#f7ebb0 61%,#c0962e 73%,#f4e09a 85%,#6b5219)',ink:'#3a2c08',inkhi:'rgba(255,250,220,.45)',inkhiStrong:'#ffeec0',top:'#fff6cf',mid:'#caa233',bot:'#7a5e1e'},
  platinum:{metal:'linear-gradient(118deg,#4a4f56,#8b939c 13%,#e9eef3 25%,#aab2bb 35%,#5e646c 49%,#f6f9fc 61%,#9aa2ab 73%,#e9eef3 85%,#52575e)',ink:'#23272d',inkhi:'rgba(255,255,255,.55)',inkhiStrong:'#f2f6fa',top:'#ffffff',mid:'#b9c1ca',bot:'#5a6066'},
  crimson:{metal:'linear-gradient(118deg,#3f1418,#9c2f37 13%,#ea9295 25%,#c2545a 35%,#5a1d22 49%,#f4b8ba 61%,#a83b40 73%,#ea9295 85%,#451519)',ink:'#3a1014',inkhi:'rgba(255,220,220,.4)',inkhiStrong:'#ffd9da',top:'#ffe9e9',mid:'#d06a6e',bot:'#5a1d22'},
  emerald:{metal:'linear-gradient(118deg,#0e3327,#1f8f63 13%,#82e6bd 25%,#34ad7b 35%,#124734 49%,#abf2d6 61%,#239268 73%,#82e6bd 85%,#103a2c)',ink:'#0c2a1f',inkhi:'rgba(220,255,240,.4)',inkhiStrong:'#d6ffec',top:'#eafff4',mid:'#3fcf8f',bot:'#104734'},
  violet:{metal:'linear-gradient(118deg,#241544,#6a3fb0 13%,#c6a8f2 25%,#8157c8 35%,#2e1d56 49%,#dcc8f8 61%,#6f44b6 73%,#c6a8f2 85%,#221440)',ink:'#221038',inkhi:'rgba(235,225,255,.45)',inkhiStrong:'#e8dcff',top:'#f4ecff',mid:'#a07be0',bot:'#2e1d56'},
  sapphire:{metal:'linear-gradient(118deg,#0d243f,#2f6db0 13%,#a3cdf2 25%,#4683c8 35%,#102f50 49%,#c2dff8 61%,#3572b6 73%,#a3cdf2 85%,#0c1f38)',ink:'#0c1f38',inkhi:'rgba(220,238,255,.45)',inkhiStrong:'#dcefff',top:'#ecf6ff',mid:'#6aa3e0',bot:'#102f50'},
};

/* stake tiers & value scaling (value = stake × multiplier) */
const PRICES=[5,15,25,50,100,250];
const VOLMULT={Extreme:64,High:56,Moderate:52};
const RMULT={epic:12,rare:3,uncommon:0.6,common:0.07};
function cardMult(r,vol){ return r==='legendary'?VOLMULT[vol]:RMULT[r]; }
function cardValue(price,r,vol){ return Math.max(1, Math.round(price*cardMult(r,vol))); }
function tierFor(price){ return price<25?'Standard':price<100?'Premium':'Elite'; }
const CARDS=5;

const COLLECTIONS=[
  {coll:'Almighty Empire',vol:'Extreme',foil:'gold',cards:[
    {n:'Almighty Poseidon',r:'legendary',g:'🔱'},{n:'Almighty Zeus',r:'epic',g:'⚡'},{n:'Almighty Athena',r:'epic',g:'🦉'},
    {n:'Goldfeather Oracle',r:'rare',g:'🪶'},{n:'Deity Dionysus',r:'rare',g:'🍇'},
    {n:'Temple Zephyr',r:'uncommon',g:'🌬️'},{n:'Oracle Initiate',r:'uncommon',g:'🔮'},
    {n:'Mortal Acolyte',r:'common',g:'🕯️'},{n:'Temple Guard',r:'common',g:'🛡️'},{n:'Clay Idol',r:'common',g:'🏺'}]},
  {coll:'Hypercar Vault',vol:'High',foil:'platinum',cards:[
    {n:'Crimson Phoenix GT',r:'legendary',g:'🏎️'},{n:'Midnight Eclipse',r:'epic',g:'🚗'},{n:'Celestial Serpent',r:'epic',g:'🏎️'},
    {n:'Obsidian Tyrant',r:'rare',g:'🚘'},{n:'Golden Seraph',r:'rare',g:'🚙'},
    {n:'Neon Apex',r:'uncommon',g:'🚗'},{n:'Sapphire Vortex',r:'uncommon',g:'🚙'},
    {n:'Asphalt Drifter',r:'common',g:'🚕'},{n:'Chrome Comet',r:'common',g:'🚖'},{n:'Steel Hatch',r:'common',g:'🚐'}]},
  {coll:'Eternal Night',vol:'Extreme',foil:'crimson',cards:[
    {n:'Dorian, Lord of Night',r:'legendary',g:'🧛'},{n:'Scarlett, Undying Fire',r:'epic',g:'🔥'},{n:"Morrena, Death's Beloved",r:'epic',g:'💀'},
    {n:'Aldric, Undying Oath',r:'rare',g:'⚔️'},{n:'Nightblade Page',r:'rare',g:'🗡️'},
    {n:'Duskbound Acolyte',r:'uncommon',g:'🕯️'},{n:'Pale Servant',r:'uncommon',g:'🦇'},
    {n:'Crypt Moth',r:'common',g:'🦋'},{n:'Grave Dust',r:'common',g:'⚰️'},{n:'Cursed Coin',r:'common',g:'🪙'}]},
  {coll:'Wildlands',vol:'Moderate',foil:'emerald',cards:[
    {n:'The Ancient Crustacean',r:'legendary',g:'🦀'},{n:'Razorclaw Raider',r:'epic',g:'🦅'},{n:'Tempest Phantom',r:'epic',g:'🐊'},
    {n:'Storm Diver',r:'rare',g:'🐬'},{n:'Jungle Stalker',r:'rare',g:'🐅'},
    {n:'Verdant Warden',r:'uncommon',g:'🦎'},{n:'Shadow Leaper',r:'uncommon',g:'🐆'},
    {n:'Bog Skitter',r:'common',g:'🦗'},{n:'Dust Nibbler',r:'common',g:'🐁'},{n:'Reed Frog',r:'common',g:'🐸'}]},
  {coll:'Cyber Drift',vol:'High',foil:'violet',cards:[
    {n:'Phoenix Overlord',r:'legendary',g:'🦅'},{n:'Inferno Warlord',r:'epic',g:'🔥'},{n:'Volt Reaper',r:'epic',g:'⚡'},
    {n:'Tempest Phantom',r:'rare',g:'👾'},{n:'Grid Warden',r:'rare',g:'🛡️'},
    {n:'Razor Synth',r:'uncommon',g:'🎛️'},{n:'Pulse Rider',r:'uncommon',g:'🏍️'},
    {n:'Grid Runner',r:'common',g:'🛹'},{n:'Static Ghost',r:'common',g:'📡'},{n:'Data Mite',r:'common',g:'🐞'}]},
  {coll:'Flags of the World',vol:'Moderate',foil:'sapphire',cards:[
    {n:'Vatican City',r:'legendary',g:'🇻🇦'},{n:'Monaco',r:'epic',g:'🇲🇨'},{n:'Liechtenstein',r:'epic',g:'🇱🇮'},
    {n:'San Marino',r:'rare',g:'🇸🇲'},{n:'Iceland',r:'rare',g:'🇮🇸'},
    {n:'South Africa',r:'uncommon',g:'🇿🇦'},{n:'South Korea',r:'uncommon',g:'🇰🇷'},
    {n:'Australia',r:'common',g:'🇦🇺'},{n:'Canada',r:'common',g:'🇨🇦'},{n:'Netherlands',r:'common',g:'🇳🇱'}]},
];

/* ---------- state ---------- */
const START=250;
let cash=250, holdings=0;
let ci=0, pi=2;            // Almighty Empire @ $25
let autoBuy=false;         // ⚡ Auto Buy — reveal whole basket at once
let autoMode=null;         // 'sell' | 'revert' | null — auto-resolve every basket
const SELL_RATE=0.95;      // selling pays a 5% spread

const $=s=>document.querySelector(s);
const deckEl=$('#deck');
const money=n=>'$'+Math.round(n).toLocaleString('en-US');
const moneySigned=n=>{const r=Math.round(n);return (r>=0?'+':'−')+'$'+Math.abs(r).toLocaleString('en-US');};
const anyOverlay=()=>$('#reveal').classList.contains('show')||$('#review').classList.contains('show')||$('#info').classList.contains('show');

function packHTML(){
  const c=COLLECTIONS[ci], price=PRICES[pi], f=FOIL[c.foil];
  const style=`--metal:${f.metal};--ink-foil:${f.ink};--ink-hi:${f.inkhi};--inkhi-strong:${f.inkhiStrong};--logo-top:${f.top};--logo-mid:${f.mid};--logo-bot:${f.bot};`;
  const maxv=cardValue(price,'legendary',c.vol);
  return `<div class="pack" style="${style}">
    <div class="sheen"></div>
    <div class="crimp top"></div>
    <div class="crimp bot"></div>
    <div class="pframe">
      <div class="pk-vol">
        <span class="vol-tag"><svg viewBox="0 0 24 24"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>${c.vol} Volatility</span>
        <span class="vol-max">up to ${money(maxv)}</span>
      </div>
      <div class="pk-tier emboss">${tierFor(price)} · ${CARDS} Positions</div>
      <div class="pk-coll">${c.coll}</div>
      <div class="pk-logo">RIPPIT</div>
      <div class="pk-sub emboss">Build the set · Beat the market</div>
      <div class="pk-rule"></div>
      <div class="pk-price emboss">Stake <b>${money(price)}</b></div>
    </div>
  </div>`;
}

/* ---------- pack carousel ---------- */
const SLIDE={
  left:{enter:'translateX(118%)',exit:'translateX(-118%)'},
  right:{enter:'translateX(-118%)',exit:'translateX(118%)'},
  up:{enter:'translateY(118%)',exit:'translateY(-118%)'},
  down:{enter:'translateY(-118%)',exit:'translateY(118%)'},
};
let currentEl=null;
function showPack(gesture){
  deckEl.insertAdjacentHTML('beforeend', packHTML());
  const el=deckEl.lastElementChild;
  bindDrag(el);
  if(!currentEl || !gesture){
    if(currentEl) currentEl.remove();
    currentEl=el; el.classList.add('settle'); el.style.transform='translate(0,0)';
    updateHints(); return;
  }
  const s=SLIDE[gesture], old=currentEl; currentEl=el;
  el.style.transition='none'; el.style.transform=s.enter; el.style.opacity='1';
  requestAnimationFrame(()=>{
    el.style.transition='transform .46s var(--spring),opacity .4s';
    el.style.transform='translate(0,0)';
    old.classList.remove('settle');
    old.style.transition='transform .46s ease,opacity .46s'; old.style.transform=s.exit; old.style.opacity='0';
    setTimeout(()=>old.remove(),480);
  });
  updateHints();
}

/* ---------- drag ---------- */
let drag=null;
function bindDrag(el){ el.addEventListener('pointerdown', e=>onDown(e,el)); }
function onDown(e,el){
  if(anyOverlay()||el!==currentEl)return;
  drag={x:e.clientX,y:e.clientY,t:Date.now(),el};
  el.classList.remove('settle'); el.classList.add('grab'); el.setPointerCapture(e.pointerId);
  el.addEventListener('pointermove',onMove); el.addEventListener('pointerup',onUp); el.addEventListener('pointercancel',onUp);
}
function onMove(e){
  if(!drag)return;
  const dx=e.clientX-drag.x;
  drag.el.style.transform=`translate(${dx}px,0) rotate(${dx*0.035}deg)`;
}
function onUp(e){
  if(!drag)return;
  const dx=e.clientX-drag.x, dt=Date.now()-drag.t, vx=Math.abs(dx)/dt;
  const el=drag.el; el.classList.remove('grab');
  el.removeEventListener('pointermove',onMove); el.removeEventListener('pointerup',onUp);
  drag=null;
  if(dx<=-70||(dx<-34&&vx>0.5)) return changeColl('left');
  if(dx>=70||(dx>34&&vx>0.5)) return changeColl('right');
  snapBack();
}
function snapBack(){ if(!currentEl)return; currentEl.classList.add('settle'); currentEl.style.transform='translate(0,0)'; }
function bounce(){ if(!currentEl)return; snapBack(); currentEl.classList.remove('bounce'); void currentEl.offsetWidth; currentEl.classList.add('bounce'); }

const N=COLLECTIONS.length;
function changeColl(g){ ci = g==='left' ? (ci+1)%N : (ci-1+N)%N; showPack(g); }
function changePrice(g){
  if(g==='up'){ if(pi>=PRICES.length-1) return bounce(); pi++; showPack('down'); }
  else { if(pi<=0) return bounce(); pi--; showPack('up'); }
}

/* ---------- hints / HUD ---------- */
function updateHints(){
  $('#p-val').textContent=money(PRICES[pi]);
  $('#buy-cost').textContent=money(PRICES[pi]);
  $('#p-minus').classList.toggle('disabled', pi<=0);
  $('#p-plus').classList.toggle('disabled', pi>=PRICES.length-1);
}
function updateHUD(){
  const pl=cash+holdings-START;
  $('#pf-snp').textContent=money(holdings);
  $('#pf-cash').textContent=money(cash);
  const b=$('#pf-pl');
  b.textContent=moneySigned(pl);
  b.classList.toggle('up', pl>=0);
  b.classList.toggle('down', pl<0);
}

/* ---------- rarity engine ---------- */
function pickRarity(vol){
  const boost = vol==='Extreme'?1.9 : vol==='High'?1.4 : 1;
  const w=RORDER.map(k=>{ let p=R[k].p; if(k==='legendary'||k==='epic')p*=boost; if(k==='common')p/=Math.sqrt(boost); return p; });
  const sum=w.reduce((a,b)=>a+b,0); let r=Math.random()*sum, acc=0;
  for(let i=0;i<RORDER.length;i++){acc+=w[i]; if(r<=acc)return RORDER[i];}
  return 'common';
}
function pullOne(c){
  let rar=pickRarity(c.vol), cands=c.cards.filter(x=>x.r===rar), gi=RORDER.indexOf(rar);
  while(!cands.length&&gi>0){gi--;cands=c.cards.filter(x=>x.r===RORDER[gi]);}
  if(!cands.length)cands=c.cards;
  return cands[Math.floor(Math.random()*cands.length)];
}

/* ---------- buy a position ---------- */
function buyPosition(){
  if(anyOverlay())return;
  const c=COLLECTIONS[ci], price=PRICES[pi], cost=price;
  if(cash<cost){ toast('Need '+money(cost)+' to buy — cash is '+money(cash)); bounce(); return; }
  cash-=cost; updateHUD();
  if(currentEl) currentEl.animate([{transform:'translate(0,0) scale(1)'},{transform:'translate(0,0) scale(1.05)'},{transform:'translate(0,0) scale(1)'}],{duration:260,easing:'ease'});
  const picks=Array.from({length:CARDS},()=>pullOne(c));
  const vals=picks.map(p=>cardValue(price,p.r,c.vol));
  if(autoBuy && autoMode) instantResolve(c,picks,vals);    // ⚡ + auto rule → instant
  else if(autoBuy) bulkReveal(c,price,picks,vals,null);    // ⚡ only → manual bulk decision
  else if(autoMode) bulkReveal(c,price,picks,vals,autoMode);// auto rule → show then auto-resolve
  else startReview(c,picks,vals);                          // default → review each position
}

/* instant grind — no overlay */
function instantResolve(c,picks,vals){
  const total=vals.reduce((a,b)=>a+b,0);
  if(autoMode==='sell'){ const g=total*SELL_RATE; cash+=g; toast('⚡ Flipped '+CARDS+' positions · +'+money(g)+' cash'); }
  else { holdings+=total; toast('⚡ Reverted '+CARDS+' positions · +'+money(total)+' held'); }
  updateHUD();
  const bestR=picks.reduce((b,p)=>RORDER.indexOf(p.r)>RORDER.indexOf(b)?p.r:b,'common');
  if(bestR==='epic'||bestR==='legendary'){ flash(); sparkle(R[bestR].color,bestR==='legendary',$('.phone')); }
}

/* ---------- bulk reveal ---------- */
let bulkCards=[], bulkSold=0, bulkKept=0;
function bulkReveal(c,price,picks,vals,autoResolve){
  const n=picks.length, bulk=n>5, stagger=bulk?45:150;
  const total=vals.reduce((a,b)=>a+b,0);
  const bestIdx=picks.reduce((bi,p,i)=>RORDER.indexOf(p.r)>RORDER.indexOf(picks[bi].r)?i:bi,0);
  const bestR=picks[bestIdx].r;
  const hand=$('#rv-hand'); hand.innerHTML=''; hand.classList.toggle('bulk',bulk);
  bulkCards=[]; bulkSold=0; bulkKept=0;
  picks.forEach((p,i)=>{
    const m=R[p.r], el=document.createElement('div');
    el.className='mini'; el.style.setProperty('--mg',m.color);
    el.innerHTML=`<div class="mr">${m.label}</div><div class="mg">${p.g}</div><div class="mv">${money(vals[i])}</div>`;
    el.addEventListener('animationend',()=>{ el.classList.remove('in'); el.style.transform='none'; el.style.opacity='1'; },{once:true});
    hand.appendChild(el); setTimeout(()=>el.classList.add('in'),120+i*stagger);
    const rec={el,v:vals[i],done:false}; bulkCards.push(rec); makeMiniSwipe(rec);
  });
  $('#rv-title').textContent=c.coll;
  $('#rv-sub').textContent=tierFor(price)+' · '+money(price);
  $('#reveal').classList.add('show');
  updateBulkButtons();
  const dealMs=120+n*stagger+300, tEl=$('#rv-total'); tEl.textContent='$0';
  setTimeout(()=>{
    let cur=0; clearInterval(tEl._iv);
    tEl._iv=setInterval(()=>{cur+=total/22; if(cur>=total){cur=total;clearInterval(tEl._iv);} tEl.textContent=money(cur);},24);
  },dealMs);
  if(bestR==='epic'||bestR==='legendary') setTimeout(()=>{ flash(); sparkle(R[bestR].color,bestR==='legendary'); },dealMs);
  if(autoResolve) setTimeout(()=>resolveAll(autoResolve==='sell'), dealMs+460);
}
function updateBulkButtons(){
  const rem=bulkCards.filter(r=>!r.done), remTotal=rem.reduce((a,r)=>a+r.v,0);
  $('#rv-sellall').textContent = rem.length ? 'Sell '+money(remTotal*SELL_RATE) : 'Sell';
  $('#rv-revertall').textContent = rem.length ? 'Revert '+money(remTotal) : 'Revert';
  $('#rv-net').innerHTML = `Sold <span style="color:var(--flare);font-weight:700">${money(bulkSold)}</span> · Reverted <span style="color:var(--emerald);font-weight:700">${money(bulkKept)}</span>`;
}
function resolveCard(rec, sell){
  if(rec.done)return; rec.done=true;
  const el=rec.el, v=rec.v;
  if(sell){ const g=v*SELL_RATE; cash+=g; bulkSold+=g; } else { holdings+=v; bulkKept+=v; }
  updateHUD(); updateBulkButtons();
  el.style.transition='transform .3s ease, opacity .3s';
  el.style.transform=`translate(${sell?-300:300}px,-12px) rotate(${sell?-22:22}deg)`; el.style.opacity='0';
  setTimeout(()=>{ el.style.display='none'; if(bulkCards.every(r=>r.done)) finishBulk(); }, 300);
}
function resolveAll(sell){
  const rem=bulkCards.filter(r=>!r.done);
  if(!rem.length){ finishBulk(); return; }
  rem.forEach((r,i)=> setTimeout(()=>resolveCard(r,sell), i*55));
}
function finishBulk(){
  $('#reveal').classList.remove('show');
  const parts=[]; if(bulkSold)parts.push('sold '+money(bulkSold)); if(bulkKept)parts.push('reverted '+money(bulkKept));
  if(parts.length) toast('You '+parts.join(' · '));
}
function makeMiniSwipe(rec){
  const el=rec.el; let d=null;
  el.addEventListener('pointerdown',e=>{
    if(rec.done)return;
    d={x:e.clientX,t:Date.now()};
    el.style.transition='none'; el.style.zIndex='20'; el.setPointerCapture(e.pointerId);
    el.addEventListener('pointermove',mv); el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up);
  });
  function mv(e){ if(!d)return; const dx=e.clientX-d.x;
    el.style.transform=`translate(${dx}px,0) rotate(${dx*0.06}deg)`;
    el.style.boxShadow = dx<-18?'0 0 18px 0 var(--flare)' : dx>18?'0 0 18px 0 var(--emerald)' : ''; }
  function up(e){ if(!d)return; const dx=e.clientX-d.x, dt=Date.now()-d.t, vx=Math.abs(dx)/dt;
    el.removeEventListener('pointermove',mv); el.removeEventListener('pointerup',up); d=null; el.style.boxShadow='';
    if(dx<=-40||(dx<-22&&vx>0.4)) return resolveCard(rec,true);
    if(dx>=40||(dx>22&&vx>0.4)) return resolveCard(rec,false);
    el.style.transition='transform .3s var(--spring)'; el.style.transform='none'; el.style.zIndex=''; }
}

/* ---------- per-position review ---------- */
let rvwQueue=[], rvwIdx=0, rvwSold=0, rvwKept=0, rvwColl='';
function startReview(c,picks,vals){
  rvwQueue=picks.map((p,i)=>({p,v:vals[i]}));
  rvwIdx=0; rvwSold=0; rvwKept=0; rvwColl=c.coll;
  $('#review').classList.add('show');
  showReviewCard();
}
function showReviewCard(){
  const {p,v}=rvwQueue[rvwIdx], m=R[p.r], n=rvwQueue.length;
  $('#rvw-progress').textContent='Card '+(rvwIdx+1)+' of '+n;
  $('#rvw-coll').textContent=rvwColl;
  $('#rvw-rar').textContent=m.label; $('#rvw-rar').style.color=m.color;
  $('#rvw-g').textContent=p.g; $('#rvw-name').textContent=p.n;
  $('#rvw-sell').textContent='Sell '+money(v*SELL_RATE);
  $('#rvw-revert').textContent='Revert';
  const card=$('#rvw-card'); card.style.setProperty('--mg',m.color);
  card.style.boxShadow=`0 0 50px -8px ${m.color}, inset 0 0 0 2px ${m.color}66`;
  card.style.transition='none'; card.style.transform=''; card.style.opacity='';
  $('#rvw-sellstamp').style.opacity=0; $('#rvw-revertstamp').style.opacity=0;
  card.classList.remove('in'); void card.offsetWidth; card.classList.add('in');
  const vEl=$('#rvw-val'); let cur=0; clearInterval(vEl._iv); vEl.textContent='$0';
  vEl._iv=setInterval(()=>{cur+=v/16; if(cur>=v){cur=v;clearInterval(vEl._iv);} vEl.textContent=money(cur);},20);
  const dots=$('#rvw-dots');
  if(n<=12){ dots.style.display='flex'; dots.innerHTML=rvwQueue.map((_,i)=>`<i class="${i<rvwIdx?'done':i===rvwIdx?'cur':''}"></i>`).join(''); }
  else dots.style.display='none';
  $('#rvw-tally').innerHTML=(rvwSold||rvwKept)?`Sold <b>${money(rvwSold)}</b> · reverted <b>${money(rvwKept)}</b>`:'Swipe ← to sell · → to revert';
  if(p.r==='epic'||p.r==='legendary'){ flash(); sparkle(m.color,p.r==='legendary',$('#review')); }
}
function reviewDecision(sell){
  const {v}=rvwQueue[rvwIdx];
  if(sell){ const g=v*SELL_RATE; cash+=g; rvwSold+=g; } else { holdings+=v; rvwKept+=v; }
  updateHUD(); rvwIdx++;
  if(rvwIdx<rvwQueue.length) showReviewCard();
  else { $('#review').classList.remove('show'); toast('Reviewed '+rvwQueue.length+' · sold '+money(rvwSold)+' · reverted '+money(rvwKept)); }
}
$('#rvw-sell').onclick=()=>reviewDecision(true);
$('#rvw-revert').onclick=()=>reviewDecision(false);

/* swipe the review card — left = sell, right = revert */
let rdrag=null;
const rvCard=$('#rvw-card');
rvCard.addEventListener('pointerdown',e=>{
  if(!$('#review').classList.contains('show'))return;
  rdrag={x:e.clientX,t:Date.now()};
  rvCard.style.transition='none'; rvCard.setPointerCapture(e.pointerId);
  rvCard.addEventListener('pointermove',rvMove);
  rvCard.addEventListener('pointerup',rvUp);
  rvCard.addEventListener('pointercancel',rvUp);
});
function rvMove(e){
  if(!rdrag)return;
  const dx=e.clientX-rdrag.x;
  rvCard.style.transform=`translateX(${dx}px) rotate(${dx*0.05}deg)`;
  const k=Math.min(Math.abs(dx)/90,1);
  $('#rvw-sellstamp').style.opacity=dx<0?k:0;
  $('#rvw-revertstamp').style.opacity=dx>0?k:0;
}
function rvUp(e){
  if(!rdrag)return;
  const dx=e.clientX-rdrag.x, dt=Date.now()-rdrag.t, vx=Math.abs(dx)/dt;
  rvCard.removeEventListener('pointermove',rvMove);
  rvCard.removeEventListener('pointerup',rvUp);
  rdrag=null;
  if(dx<=-80||(dx<-34&&vx>0.5)) return rvFly(-1,true);
  if(dx>=80||(dx>34&&vx>0.5)) return rvFly(1,false);
  rvCard.style.transition='transform .4s var(--spring)';
  rvCard.style.transform='translateX(0) rotate(0)';
  $('#rvw-sellstamp').style.opacity=0; $('#rvw-revertstamp').style.opacity=0;
}
function rvFly(dir,sell){
  rvCard.style.transition='transform .32s ease, opacity .32s';
  rvCard.style.transform=`translateX(${dir*480}px) rotate(${dir*22}deg)`;
  rvCard.style.opacity=0;
  $('#rvw-sellstamp').style.opacity=0; $('#rvw-revertstamp').style.opacity=0;
  setTimeout(()=>reviewDecision(sell),300);
}

/* reveal-overlay bulk buttons */
$('#rv-sellall').onclick=()=>resolveAll(true);
$('#rv-revertall').onclick=()=>resolveAll(false);

/* ---------- main action bar (idle behaviour) ---------- */
function sellAllAction(){
  if($('#reveal').classList.contains('show')) return resolveAll(true);
  if($('#review').classList.contains('show')) return reviewDecision(true);
  if(holdings>0){ const g=holdings*SELL_RATE; cash+=g; holdings=0; updateHUD(); toast('Liquidated portfolio · +'+money(g)+' to cash'); }
  else toast('No S&P holdings to sell — Buy a position first');
}
function revertAction(){
  if($('#reveal').classList.contains('show')) return resolveAll(false);
  if($('#review').classList.contains('show')) return reviewDecision(false);
  toast('Revert holds a position — Buy first, then Revert to keep it');
}
$('#a-buy').onclick=buyPosition;
$('#a-sell').onclick=sellAllAction;
$('#a-revert').onclick=revertAction;

/* ---------- automation toggles ---------- */
$('#a-bolt').onclick=()=>{
  autoBuy=!autoBuy;
  $('#a-bolt').classList.toggle('on',autoBuy);
  $('#a-bolt').setAttribute('aria-pressed',autoBuy);
  toast(autoBuy?'⚡ Auto Buy on — whole basket revealed at once':'Auto Buy off — review each position');
};
function setAuto(mode){
  autoMode = (autoMode===mode) ? null : mode;
  const s=$('#auto-sell'), r=$('#auto-revert');
  s.classList.toggle('on',autoMode==='sell'); s.setAttribute('aria-checked',autoMode==='sell');
  r.classList.toggle('on',autoMode==='revert'); r.setAttribute('aria-checked',autoMode==='revert');
  toast(autoMode==='sell'?'Auto Sell on — new baskets sell automatically'
      :autoMode==='revert'?'Auto Revert on — new baskets are held automatically'
      :'Auto-resolve off — you decide each basket');
}
$('#auto-sell').onclick=()=>setAuto('sell');
$('#auto-revert').onclick=()=>setAuto('revert');

/* ---------- effects ---------- */
function flash(){const f=$('#flash');f.classList.remove('go');void f.offsetWidth;f.classList.add('go');}
function sparkle(color,big,wrap){
  wrap=wrap||$('#reveal');
  const n=big?24:12, gl=big?['✦','★','✧','💎','⭐']:['✦','✧'];
  for(let i=0;i<n;i++){
    const s=document.createElement('span');s.className='spark';s.textContent=gl[i%gl.length];
    s.style.color=color;s.style.left='50%';s.style.top='52%';wrap.appendChild(s);
    const a=Math.random()*Math.PI*2, d=80+Math.random()*150;
    s.animate([{transform:'translate(-50%,-50%) scale(.2)',opacity:1},{transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(${.8+Math.random()})`,opacity:0}],
      {duration:700+Math.random()*500,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=()=>s.remove();
  }
}

/* ---------- info panel ---------- */
function showInfo(){
  const c=COLLECTIONS[ci], price=PRICES[pi], f=FOIL[c.foil];
  const rows=[...c.cards].sort((a,b)=>cardValue(price,b.r,c.vol)-cardValue(price,a.r,c.vol)).map(x=>{
    const m=R[x.r];
    return `<div class="row"><div class="g">${x.g}</div><div class="nm">${x.n}</div>
      <div class="rr" style="color:${m.color};background:${m.color}22">${m.label}</div>
      <div class="vv">${money(cardValue(price,x.r,c.vol))}</div></div>`;
  }).join('');
  const odds=RORDER.map(k=>`<i style="flex:${Math.max(R[k].p*100,2.5)};background:${R[k].color}" title="${R[k].label} ${(R[k].p*100).toFixed(1)}%"></i>`).join('');
  $('#info-body').innerHTML=`
    <div class="dh"><b>How P/L works</b></div>
    <div class="dnote"><b style="color:var(--ink)">Total P/L</b> = <b style="color:var(--electric)">S&amp;P</b> (positions you've held via Revert) + <b style="color:var(--flare)">Cash</b> − your ${money(START)} starting stake.<br>
    <b style="color:var(--flare)">Sell</b> realizes a position to cash (−5% spread). <b style="color:var(--emerald)">Revert</b> holds it in your portfolio at full value. While idle, <b>Sell All</b> liquidates every holding back to cash.</div>
    <div class="dh" style="margin-top:18px"><b>${c.coll}</b><span style="color:${f.mid};font-size:11px;letter-spacing:.18em;text-transform:uppercase">${tierFor(price)} · ${money(price)}</span></div>
    <div class="dnote">${CARDS} positions per basket · ${c.vol} volatility means payouts swing from a couple dollars up to <b style="color:var(--flare)">${money(cardValue(price,'legendary',c.vol))}</b>. Position values scale with the stake you set.</div>
    <div class="oddbar">${odds}</div>
    <div style="display:flex;justify-content:space-between;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--smoke);margin-bottom:8px"><span>Common</span><span>Legendary</span></div>
    ${rows}`;
  $('#info').classList.add('show');
}
$('#pf-info').onclick=showInfo;
$('#info-close').onclick=()=>$('#info').classList.remove('show');

/* ---------- stepper + market chevrons ---------- */
$('#p-minus').onclick=()=>changePrice('down');
$('#p-plus').onclick=()=>changePrice('up');
$('#h-left').onclick=()=>changeColl('right');
$('#h-right').onclick=()=>changeColl('left');

/* ---------- toast ---------- */
let toastTimer;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800);}

/* ---------- keyboard ---------- */
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if($('#reveal').classList.contains('show')){
    if(k==='s')resolveAll(true);
    else if(k==='r'||k==='c')resolveAll(false);
    else if(e.key==='Escape')$('#reveal').classList.remove('show');
    return;
  }
  if($('#review').classList.contains('show')){
    if(e.key==='ArrowLeft'||k==='s')reviewDecision(true);
    else if(e.key==='ArrowRight'||k==='r'||k==='c')reviewDecision(false);
    else if(e.key==='Escape')$('#review').classList.remove('show');
    return;
  }
  if($('#info').classList.contains('show')){ if(e.key==='Escape')$('#info').classList.remove('show'); return; }
  if(e.key==='ArrowLeft')changeColl('left');
  else if(e.key==='ArrowRight')changeColl('right');
  else if(e.key==='ArrowUp'){e.preventDefault();changePrice('up');}
  else if(e.key==='ArrowDown'){e.preventDefault();changePrice('down');}
  else if(e.key===' '||e.key==='Enter'){ if(document.activeElement&&document.activeElement.tagName==='BUTTON')return; e.preventDefault(); buyPosition(); }
  else if(k==='b'){ buyPosition(); }
  else if(k==='s'){ sellAllAction(); }
  else if(k==='r'){ revertAction(); }
  else if(k==='f'){ $('#a-bolt').click(); }
  else if(k==='i'){ showInfo(); }
});

showPack(); updateHUD();
</script>
